# WooMem GitLab CI/CD Configuration
# 支持平台：winserver22, mac-arm64, ubuntu22_arm64, ubuntu20

stages:
  - build
  - test

# 通用规则
workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == 'merge_request_event'
    - if: $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS
      when: never
    - if: $CI_COMMIT_BRANCH

# ============================================
# Windows Server 2022 构建与测试
# ============================================
build:winserver22:
  stage: build
  tags:
    - winserver22
  before_script:
    - git submodule sync --recursive
    - git submodule update --init --recursive
  script:
    - mkdir build
    - cd build
    - cmake .. -G "Visual Studio 17 2022" -A x64
    - cmake --build . --config Debug
    - cmake --build . --config Release
  artifacts:
    paths:
      - build/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH

test:winserver22:
  stage: test
  tags:
    - winserver22
  needs:
    - build:winserver22
  script:
    - cd build
    - ctest -C Debug --output-on-failure
    - ctest -C Release --output-on-failure
  rules:
    - if: $CI_COMMIT_BRANCH

# ============================================
# macOS ARM64 构建与测试
# ============================================
build:mac-arm64:
  stage: build
  tags:
    - mac-arm64
  before_script:
    - git submodule sync --recursive
    - git submodule update --init --recursive
  script:
    - mkdir build
    - cd build
    - cmake .. -DCMAKE_BUILD_TYPE=Debug -DCMAKE_OSX_ARCHITECTURES=arm64
    - cmake --build . -j$(sysctl -n hw.ncpu)
    - cmake .. -DCMAKE_BUILD_TYPE=Release -DCMAKE_OSX_ARCHITECTURES=arm64
    - cmake --build . -j$(sysctl -n hw.ncpu)
  artifacts:
    paths:
      - build/
    expire_in: 1 week
  rules:
    - if: $CI_COMMIT_BRANCH

test:mac-arm64:
  stage: test
  tags:
    - mac-arm64
  needs:
    - build:mac-arm64
  script:
    - cd build
    - ctest -C Debug --output-on-failure
    - ctest -C Release --output-on-failure
  rules:
    - if: $CI_COMMIT_BRANCH

